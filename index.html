<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>QR Pro Generator</title>

<script src="https://cdn.jsdelivr.net/npm/qr-code-styling/lib/qr-code-styling.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    padding: 25px;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    color: white;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 6px 0;
    border-radius: 10px;
    border: none;
}

button {
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #ff7a18;
    color: white;
    cursor: pointer;
}

.drop-zone {
    border: 2px dashed white;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
}

.drop-zone.dragover {
    background: rgba(255,255,255,0.2);
}

#qr {
    margin-top: 15px;
}
</style>
</head>

<body>

<div class="container">
    <h2>QR Pro Generator</h2>

    <input type="text" id="data" placeholder="Enter text or URL">

    <label>QR Style</label>
    <select id="style">
        <option value="square">Square</option>
        <option value="dots">Dots</option>
        <option value="extra-rounded">Rounded</option>
    </select>

    <label>QR Color</label>
    <input type="color" id="color" value="#000000">

    <div class="drop-zone" id="dropZone">
        Drag & Drop Logo or Click
        <input type="file" id="logoInput" hidden>
    </div>

    <label>Logo Size</label>
    <input type="range" id="logoSize" min="0.1" max="0.4" step="0.05" value="0.25">

    <label>Logo Position</label>
    <select id="logoPosition">
        <option value="center">Center</option>
        <option value="top">Top</option>
        <option value="bottom">Bottom</option>
    </select>

    <label><input type="checkbox" id="toggleBg" checked> Remove Background</label>
    <label><input type="checkbox" id="enhance"> Enhance Logo</label>

    <button onclick="generateQR()">Generate</button>
    <button onclick="downloadQR()">Download</button>

    <div id="qr"></div>
</div>

<script>
let qrCode;
let logoFile = null;

// Drag & Drop
const dropZone = document.getElementById("dropZone");
const fileInput = document.getElementById("logoInput");

dropZone.onclick = () => fileInput.click();

dropZone.addEventListener("dragover", (e) => {
    e.preventDefault();
    dropZone.classList.add("dragover");
});

dropZone.addEventListener("dragleave", () => {
    dropZone.classList.remove("dragover");
});

dropZone.addEventListener("drop", (e) => {
    e.preventDefault();
    dropZone.classList.remove("dragover");
    logoFile = e.dataTransfer.files[0];
});

fileInput.addEventListener("change", () => {
    logoFile = fileInput.files[0];
});

// Background removal
function removeBackgroundCanvas(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    for (let i = 0; i < data.length; i += 4) {
        if (data[i] > 200 && data[i+1] > 200 && data[i+2] > 200) {
            data[i+3] = 0;
        }
    }

    ctx.putImageData(imageData, 0, 0);
    return canvas.toDataURL();
}

// Enhancement
function enhanceImage(img) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = img.width;
    canvas.height = img.height;

    ctx.filter = "contrast(140%) brightness(110%)";
    ctx.drawImage(img, 0, 0);

    return canvas.toDataURL();
}

async function generateQR() {
    const data = document.getElementById("data").value;
    const style = document.getElementById("style").value;
    const color = document.getElementById("color").value;

    const removeBg = document.getElementById("toggleBg").checked;
    const enhance = document.getElementById("enhance").checked;
    const logoScale = parseFloat(document.getElementById("logoSize").value);
    const position = document.getElementById("logoPosition").value;

    let imageURL = null;

    if (logoFile) {
        const img = new Image();
        img.src = URL.createObjectURL(logoFile);

        await new Promise(resolve => img.onload = resolve);

        let processed = img;

        if (removeBg) {
            const temp = new Image();
            temp.src = removeBackgroundCanvas(img);
            await new Promise(r => temp.onload = r);
            processed = temp;
        }

        if (enhance) {
            const temp = new Image();
            temp.src = enhanceImage(processed);
            await new Promise(r => temp.onload = r);
            processed = temp;
        }

        imageURL = processed.src;
    }

    document.getElementById("qr").innerHTML = "";

    qrCode = new QRCodeStyling({
        width: 300,
        height: 300,
        data: data,
        image: imageURL,
        dotsOptions: {
            color: color,
            type: style
        },
        backgroundOptions: {
            color: "#ffffff"
        },
        imageOptions: {
            crossOrigin: "anonymous",
            margin: 5,
            imageSize: logoScale
        }
    });

    qrCode.append(document.getElementById("qr"));

    // Position adjustment
    if (position !== "center") {
        setTimeout(() => {
            const img = document.querySelector("#qr img");
            if (img) {
                img.style.position = "relative";
                if (position === "top") img.style.top = "-40px";
                if (position === "bottom") img.style.top = "40px";
            }
        }, 200);
    }
}

function downloadQR() {
    if (qrCode) {
        qrCode.download({ name: "qr-code", extension: "png" });
    } else {
        alert("Generate QR first!");
    }
}
</script>

</body>
</html>
